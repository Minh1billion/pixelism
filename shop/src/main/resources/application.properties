spring.application.name=shop
management.endpoints.web.exposure.include=health

# Database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_batch_fetch_size=50
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Multipart upload size
spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=30MB

# Redis cache configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=300000
spring.cache.redis.cache-null-values=false
spring.data.web.pageable.serialize-page-as-via-dto=true

# JWT configuration
shop.jwt.secret=${JWT_SECRET}
shop.jwt.expiration=${JWT_ACCESS_EXPIRATION}
shop.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION}
shop.cookie.secure=${APP_COOKIE_SECURE:true}

# Cloudinary configuration
shop.cloudinary.name=${CLOUDINARY_CLOUD_NAME}
shop.cloudinary.key=${CLOUDINARY_API_KEY}
shop.cloudinary.secret=${CLOUDINARY_API_SECRET}

# OTP configuration
shop.otp.expiration=${OTP_EXPIRATION}
shop.otp.length=${OTP_LENGTH}

# Email configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Classifier configuration
shop.classifier.url=${ML_SERVICE_URL}

# OAuth2 configuration
shop.frontend.redirect-uri=${FRONTEND_REDIRECT_URI}

spring.security.oauth2.client.registration.google.client-id=${CLIENT_ID_GOOGLE}
spring.security.oauth2.client.registration.google.client-secret=${CLIENT_SECRET_GOOGLE}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${OAUTH2_REDIRECT_BASE_URI}/login/oauth2/code/google

spring.security.oauth2.client.registration.github.client-id=${CLIENT_ID_GITHUB}
spring.security.oauth2.client.registration.github.client-secret=${CLIENT_SECRET_GITHUB}
spring.security.oauth2.client.registration.github.scope=user:email
spring.security.oauth2.client.registration.github.redirect-uri=${OAUTH2_REDIRECT_BASE_URI}/login/oauth2/code/github

# Redis
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# Logging
spring.jpa.show-sql=${LOG_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${LOG_FORMAT_SQL:false}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
logging.level.org.springframework.web=${LOG_LEVEL_WEB:WARN}
logging.level.org.hibernate.SQL=${LOG_LEVEL_HIBERNATE:WARN}
logging.level.pixelart.shop=${LOG_LEVEL_APP:INFO}
logging.level.pixelart.shop.features.user=${LOG_LEVEL_APP_USER:INFO}

# CORS configuration
server.forward-headers-strategy=framework